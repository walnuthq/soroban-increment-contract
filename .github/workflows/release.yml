name: Release

on:
  release:
    types: [published]

env:
  # Digest-pinned container image used for the verifiable build.
  VERIFIABLE_IMAGE: docker.io/stellar/stellar-cli@sha256:c1297d0c2c6790dda6afaa3edd39a959ec12edd6ebe30282dd1d7a663e7c4109

jobs:
  fetch-cli:
    name: Fetch stellar-cli
    runs-on: ubuntu-latest
    # Read other workflow runs so we can pull their artifacts.
    permissions:
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download stellar-cli from latest build-cli run
        run: |
          mkdir -p /tmp/cli
          RUN_ID=$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow build-cli.yml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "No successful 'Build stellar-cli' run found. Run that workflow manually first." >&2
            exit 1
          fi
          echo "Using stellar-cli from build-cli run ${RUN_ID}"
          gh run download "$RUN_ID" \
            --repo "${GITHUB_REPOSITORY}" \
            --name stellar-cli \
            --dir /tmp/cli

      - name: Re-upload stellar-cli for this run
        uses: actions/upload-artifact@v7
        with:
          name: stellar-cli
          path: /tmp/cli/stellar
          if-no-files-found: error
          retention-days: 1

  archive-source:
    name: Archive source
    needs: fetch-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.event.release.tag_name }}
      ARCHIVE_NAME: ${{ github.event.repository.name }}-${{ github.event.release.tag_name }}-source.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download stellar-cli
        uses: actions/download-artifact@v8
        with:
          name: stellar-cli
          path: /tmp/cli

      - name: Install stellar-cli to PATH
        run: |
          mkdir -p "$HOME/.cargo/bin"
          mv /tmp/cli/stellar "$HOME/.cargo/bin/stellar"
          chmod +x "$HOME/.cargo/bin/stellar"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Create source archive
        run: |
          stellar contract archive --out-file "${ARCHIVE_NAME}"

      - name: Upload source archive to release
        run: |
          gh release upload "${TAG}" "${ARCHIVE_NAME}" --clobber

  build-contract:
    name: Build contract
    needs: [fetch-cli, archive-source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ github.event.release.tag_name }}
      ARCHIVE_NAME: ${{ github.event.repository.name }}-${{ github.event.release.tag_name }}-source.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download stellar-cli
        uses: actions/download-artifact@v8
        with:
          name: stellar-cli
          path: /tmp/cli

      - name: Install stellar-cli to PATH
        run: |
          mkdir -p "$HOME/.cargo/bin"
          mv /tmp/cli/stellar "$HOME/.cargo/bin/stellar"
          chmod +x "$HOME/.cargo/bin/stellar"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build verifiable contract
        env:
          SOURCE_URI: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/${{ env.ARCHIVE_NAME }}
        run: |
          stellar contract build \
            --verifiable \
            --image "${VERIFIABLE_IMAGE}" \
            --source-uri="${SOURCE_URI}"

      - name: Upload wasm to release
        run: |
          gh release upload "${TAG}" ./target/wasm32v1-none/release/*.wasm --clobber
